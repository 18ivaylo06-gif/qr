<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Request</title>

  <style>
    * {
      box-sizing: border-box; /* 🔥 FIX за центриране */
    }

    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1db954, #191414);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #121212;
      padding: 30px 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      text-align: center;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    img {
      width: 180px;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0 25px;
      font-size: 24px;
    }

    form {
      width: 100%;
    }

    input {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: #1e1e1e;
      color: white;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      box-shadow: 0 0 10px #1db954; /* ✨ glow */
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      background: #1db954;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #17a74a;
      box-shadow: 0 0 15px #1db954;
    }

    button:active {
      transform: scale(0.96);
    }

    #msg {
      margin-top: 15px;
      color: #1db954;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="/logo.jpeg">
    <h1>🎧 Request a Song</h1>

    <form id="form">
      <input type="text" name="song" placeholder="Song name" required>
      <input type="text" name="artist" placeholder="Artist name" required>
      <button type="submit">Send</button>
    </form>

    <p id="msg"></p>
  </div>

  <script>
    const form = document.getElementById("form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      await fetch("/add", {
        method: "POST",
        body: new URLSearchParams(formData)
      });

      document.getElementById("msg").innerText = "✅ Sent!";
      form.reset();
    });
  </script>

</body>
</html>
